apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cilium
  namespace: kube-system
spec:
  # Mark as a bootstrap dependency for k3s helm-controller.
  bootstrap: true
  chart: cilium
  repo: https://helm.cilium.io/
  version: 1.19.0
  targetNamespace: kube-system
  failurePolicy: abort
  valuesContent: |-
    kubeProxyReplacement: "false"
    operator:
      replicas: 1
    hubble:
      enabled: true
      # Keep relay peer connectivity stable on IPv4-only node addresses.
      listenAddress: "0.0.0.0:4244"
      relay:
        enabled: true
        # Cilium chart v1.19.0 does not expose relay hostNetwork in values.
        # `make cilium-bootstrap` and `scripts/26_manage_cilium_lifecycle.sh`
        # patch hubble-relay to hostNetwork=true after install.
      ui:
        enabled: true
        ingress:
          enabled: false
