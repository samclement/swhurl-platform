apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homelab-app-example-keycloak-canary
  namespace: flux-system
spec:
  # Rollout safety: opt-in canary app route remains disabled until explicitly unsuspended.
  suspend: true
  dependsOn:
    - name: homelab-app-example
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: swhurl-platform
  path: ./tenants/apps/example/canary/keycloak
  prune: true
  wait: true
  timeout: 20m
