apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homelab-app-example-keycloak-canary
  namespace: flux-system
spec:
  # Rollout safety: isolated canary route does not alter existing app auth paths.
  suspend: false
  dependsOn:
    - name: homelab-app-example
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: swhurl-platform
  path: ./tenants/apps/example/canary/keycloak
  prune: true
  wait: true
  timeout: 20m
