apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homelab-cert-manager-issuers
  namespace: flux-system
spec:
  dependsOn:
    - name: homelab-infrastructure
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: swhurl-platform
  path: ./infrastructure/overlays/home-issuers
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
        optional: false
  prune: true
  wait: true
  timeout: 5m
