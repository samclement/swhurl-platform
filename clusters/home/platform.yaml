apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homelab-platform
  namespace: flux-system
spec:
  dependsOn:
    - name: homelab-cert-manager-issuers
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: swhurl-platform
  path: ./platform-services/overlays/home
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-settings
        optional: false
      - kind: Secret
        name: platform-runtime-inputs
        optional: false
  prune: true
  wait: true
  timeout: 20m
  healthChecks:
    - kind: Deployment
      name: oauth2-proxy
      namespace: auth
    - kind: Deployment
      name: clickstack
      namespace: observability
    - kind: Deployment
      name: otel-k8s-cluster-opentelemetry-collector
      namespace: logging
