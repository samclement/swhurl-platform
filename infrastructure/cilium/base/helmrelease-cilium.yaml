apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
  annotations:
    platform.swhurl.com/mode: legacy-handoff
spec:
  # Keep this resource suspended to avoid uninstall/recreate churn while
  # migrating ownership to k3s bootstrap manifests.
  suspend: true
  interval: 30m
  releaseName: cilium
  chart:
    spec:
      chart: cilium
      version: 1.19.0
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      interval: 30m
  values:
    kubeProxyReplacement: "false"
    operator:
      replicas: 1
    hubble:
      enabled: true
      listenAddress: "0.0.0.0:4244"
      relay:
        enabled: true
      ui:
        enabled: true
        ingress:
          enabled: false
