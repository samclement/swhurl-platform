apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: identity
spec:
  # Rollout safety: enabled after runtime inputs are confirmed.
  suspend: false
  interval: 30m
  timeout: 15m
  releaseName: keycloak
  chart:
    spec:
      chart: keycloak
      version: 24.2.0
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      repository: bitnamilegacy/keycloak
      tag: 26.0.5-debian-12-r0
    auth:
      adminUser: admin
      existingSecret: keycloak-runtime-inputs
      passwordSecretKey: admin-password
    production: true
    proxyHeaders: xforwarded
    httpEnabled: true
    ingress:
      enabled: true
      ingressClassName: traefik
      hostname: keycloak.homelab.swhurl.com
      path: /
      pathType: Prefix
      tls: true
      annotations:
        cert-manager.io/cluster-issuer: "${CERT_ISSUER}"
    postgresql:
      enabled: true
      image:
        repository: bitnamilegacy/postgresql
        tag: 17.0.0-debian-12-r9
      auth:
        existingSecret: keycloak-runtime-inputs
        secretKeys:
          userPasswordKey: postgres-password
