apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy-hubble
  namespace: kube-system
spec:
  interval: 30m
  releaseName: oauth2-proxy-hubble
  chart:
    spec:
      chart: oauth2-proxy
      version: 10.1.3
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
      interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    config:
      existingSecret: oauth2-proxy-hubble-secret
    extraArgs:
      provider: oidc
      oidc-issuer-url: https://accounts.google.com
      redirect-url: https://hubble.homelab.swhurl.com/oauth2/callback
      upstream: http://hubble-ui.kube-system.svc.cluster.local:80
      cookie-name: _oauth2_proxy_hubble
      email-domain: "*"
      cookie-domain: .homelab.swhurl.com
      whitelist-domain: .homelab.swhurl.com
      reverse-proxy: true
      skip-provider-button: true
      standard-logging: true
      request-logging: true
      auth-logging: true
      silence-ping-logging: true
    ingress:
      enabled: false
