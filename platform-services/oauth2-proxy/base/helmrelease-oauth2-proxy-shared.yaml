apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy-shared
  namespace: ingress
spec:
  interval: 30m
  releaseName: oauth2-proxy-shared
  chart:
    spec:
      chart: oauth2-proxy
      version: 10.1.3
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
      interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    config:
      existingSecret: oauth2-proxy-shared-secret
    extraArgs:
      provider: oidc
      oidc-issuer-url: https://accounts.google.com
      redirect-url: https://${OAUTH_HOST}/oauth2/callback
      upstream: static://202
      reverse-proxy: true
      skip-provider-button: true
      cookie-name: _oauth2_proxy_shared
      email-domain: "*"
      cookie-domain: .homelab.swhurl.com
      whitelist-domain: .homelab.swhurl.com
      standard-logging: true
      request-logging: true
      auth-logging: true
      silence-ping-logging: true
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: "${CERT_ISSUER}"
      path: /oauth2
      pathType: Prefix
      hosts:
        - ${OAUTH_HOST}
      tls:
        - secretName: oauth2-proxy-shared-tls
          hosts:
            - ${OAUTH_HOST}
